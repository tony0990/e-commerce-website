<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Products | PremiumStore</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-shopping-bag"></i> PremiumStore
            </a>
            
            <div class="search-bar">
                <input type="text" id="product-search" placeholder="Search for products...">
            </div>

            <nav class="nav-actions">
                <a href="auth.html" class="nav-link" id="auth-link">Login</a>
                <a href="cart.html" class="nav-link"><i class="fas fa-shopping-cart"></i> Cart</a>
                <div id="user-menu" style="display: none;">
                    <a href="profile.html" class="nav-link"><i class="fas fa-user-circle"></i> Profile</a>
                </div>
            </nav>
        </div>
    </header>

    <main class="container" style="padding: 3rem 1.5rem; display: grid; grid-template-columns: 250px 1fr; gap: 3rem;">
        <!-- Filter Sidebar -->
        <aside>
            <div style="position: sticky; top: 100px;">
                <h3 style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem;">
                    <i class="fas fa-sliders-h"></i> Filters
                </h3>
                
                <div style="margin-bottom: 2rem;">
                    <h4 style="font-size: 1rem; margin-bottom: 1rem;">Categories</h4>
                    <ul style="list-style: none; line-height: 2.2;">
                        <li><input type="checkbox" id="cat-elec"> <label for="cat-elec">Electronics</label></li>
                        <li><input type="checkbox" id="cat-fash"> <label for="cat-fash">Fashion</label></li>
                        <li><input type="checkbox" id="cat-home"> <label for="cat-home">Home & Living</label></li>
                        <li><input type="checkbox" id="cat-beauty"> <label for="cat-beauty">Beauty</label></li>
                    </ul>
                </div>

                <div style="margin-bottom: 2rem;">
                    <h4 style="font-size: 1rem; margin-bottom: 1rem;">Price Range</h4>
                    <input type="range" style="width: 100%; accent-color: var(--secondary);">
                    <div style="display: flex; justify-content: space-between; font-size: 0.8rem; margin-top: 0.5rem;">
                        <span>$0</span>
                        <span>$5000+</span>
                    </div>
                </div>

                <button class="btn btn-secondary" style="width: 100%;">Apply Filters</button>
            </div>
        </aside>

        <!-- Product Grid -->
        <section>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h2 style="font-size: 1.75rem;">All Products</h2>
                <select class="form-control" style="width: auto;">
                    <option>Sort by: Featured</option>
                    <option>Price: Low to High</option>
                    <option>Price: High to Low</option>
                    <option>Newest First</option>
                </select>
            </div>

            <div id="product-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 2rem;">
                <!-- Product placeholders (will be dynamic) -->
                <div class="card product-card">
                    <div style="background-color: var(--gray-100); height: 200px; border-radius: 4px; margin-bottom: 1rem; position: relative; overflow: hidden;">
                        <img src="https://via.placeholder.com/240x200?text=Premium+Watch" style="width: 100%; height: 100%; object-fit: cover;">
                        <span class="badge badge-new" style="position: absolute; top: 10px; right: 10px;">New</span>
                    </div>
                    <p style="color: var(--gray-500); font-size: 0.8rem;">Accessories</p>
                    <h3 style="font-size: 1.1rem; margin: 0.5rem 0;">Elegant Chronograph</h3>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-weight: 700; font-size: 1.2rem;">$199.99</span>
                        <button class="btn btn-primary" style="padding: 0.4rem 0.8rem;"><i class="fas fa-plus"></i></button>
                    </div>
                </div>

                <!-- More placeholders... -->
                <div class="card product-card">
                    <div style="background-color: var(--gray-100); height: 200px; border-radius: 4px; margin-bottom: 1rem;">
                        <img src="https://via.placeholder.com/240x200?text=Smartphone" style="width: 100%; height: 100%; object-fit: cover;">
                    </div>
                    <p style="color: var(--gray-500); font-size: 0.8rem;">Electronics</p>
                    <h3 style="font-size: 1.1rem; margin: 0.5rem 0;">Smart Pro X2</h3>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-weight: 700; font-size: 1.2rem;">$899.00</span>
                        <button class="btn btn-primary" style="padding: 0.4rem 0.8rem;"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import api from './js/api.js';
        
        if (localStorage.getItem('token')) {
            document.getElementById('auth-link').style.display = 'none';
            document.getElementById('user-menu').style.display = 'block';
        }
    </script>
</body>
</html>
