<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart — PremiumStore</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="site-header">
  <div class="container nav-inner">
    <a href="index.html" class="logo"><i class="fas fa-bolt"></i> PremiumStore</a>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="category.html">Categories</a>
      <a href="auth.html"><i class="fas fa-user"></i></a>
      <a href="cart.html" class="nav-cart active">
        <i class="fas fa-shopping-bag"></i>
        <span class="cart-badge">0</span>
      </a>
    </nav>
  </div>
</header>

<main class="container" style="padding-top:3rem;padding-bottom:5rem;">
  <h1 style="font-size:2rem;font-weight:800;margin-bottom:2.5rem;">
    <i class="fas fa-shopping-bag" style="color:var(--cyan);margin-right:.5rem;"></i>Your Cart
  </h1>

  <div id="cart-root"></div>
</main>

<footer class="footer">
  <div class="container">
    <div class="footer-bottom">© 2025 PremiumStore. All rights reserved.</div>
  </div>
</footer>

<script type="module">
import { cart, DELIVERY_FEE } from './js/cart-system.js';

function fmt(n) { return '$' + n.toFixed(2); }

function render() {
  const root = document.getElementById('cart-root');

  if (cart.items.length === 0) {
    root.innerHTML = `
      <div class="empty-state">
        <i class="fas fa-shopping-bag"></i>
        <h2>Your cart is empty</h2>
        <p>Looks like you haven't discovered anything yet. Start shopping!</p>
        <a href="index.html" class="btn btn-primary">Start Discovering</a>
      </div>`;
    return;
  }

  root.innerHTML = `
    <div class="cart-layout">
      <!-- Items -->
      <div id="items-col">
        ${cart.items.map(item => `
          <div class="cart-item" data-id="${item.id}">
            <a href="details.html?id=${item.id}" class="cart-item__img">
              <img src="${item.image}" alt="${item.name}"
                onerror="this.src='https://placehold.co/200x200/e0f7fa/0eb5c8?text=Product'">
            </a>
            <div>
              <div class="cart-item__cat">${item.category}</div>
              <div class="cart-item__name">${item.name}</div>
              <div class="cart-item__price">${fmt(item.price)} each</div>
              <div style="display:flex;align-items:center;gap:.75rem;margin-top:.75rem;">
                <div class="qty-box">
                  <button class="qty-dec" data-id="${item.id}"><i class="fas fa-minus"></i></button>
                  <span>${item.qty}</span>
                  <button class="qty-inc" data-id="${item.id}"><i class="fas fa-plus"></i></button>
                </div>
                <button class="cart-item__remove" data-id="${item.id}">
                  <i class="fas fa-trash-can"></i> Remove
                </button>
              </div>
            </div>
            <div class="cart-item__right">
              <div class="cart-item__total">${fmt(item.price * item.qty)}</div>
            </div>
          </div>`).join('')}
      </div>

      <!-- Summary -->
      <div>
        <div class="order-card">
          <h3>Order Summary</h3>
          <div class="order-row"><span>Subtotal (${cart.count()} item${cart.count() !== 1 ? 's' : ''})</span><span>${fmt(cart.subtotal())}</span></div>
          <div class="order-row"><span>Delivery Fee</span><span>${fmt(DELIVERY_FEE)}</span></div>
          <div class="order-row cyan"><span><i class="fas fa-tag"></i> Promo savings</span><span>$0.00</span></div>
          <div class="order-row bold"><span>Total</span><span>${fmt(cart.total())}</span></div>
          <a href="checkout.html" class="btn btn-primary" style="width:100%;margin-top:1.5rem;justify-content:center;font-size:1rem;">
            <i class="fas fa-lock"></i> Secure Checkout
          </a>
          <a href="index.html" style="display:block;text-align:center;margin-top:1rem;font-size:.85rem;color:var(--text-mute);">
            ← Continue Shopping
          </a>
        </div>
      </div>
    </div>`;

  // Bind events after render
  root.querySelectorAll('.qty-dec').forEach(btn => {
    btn.addEventListener('click', () => {
      const item = cart.items.find(i => i.id === +btn.dataset.id);
      if (item) { cart.setQty(item.id, item.qty - 1); render(); }
    });
  });
  root.querySelectorAll('.qty-inc').forEach(btn => {
    btn.addEventListener('click', () => {
      const item = cart.items.find(i => i.id === +btn.dataset.id);
      if (item) { cart.setQty(item.id, item.qty + 1); render(); }
    });
  });
  root.querySelectorAll('.cart-item__remove').forEach(btn => {
    btn.addEventListener('click', () => { cart.remove(+btn.dataset.id); render(); });
  });
}

render();
cart._badge();
</script>
</body>
</html>
