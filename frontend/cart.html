<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | PremiumStore</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-shopping-bag"></i> PremiumStore
            </a>
            
            <nav class="nav-actions">
                <a href="products.html" class="nav-link">Shop</a>
                <div id="user-menu" style="display: none;">
                    <a href="profile.html" class="nav-link"><i class="fas fa-user-circle"></i> Profile</a>
                </div>
            </nav>
        </div>
    </header>

    <main class="container" style="padding: 4rem 1.5rem;">
        <h1 style="margin-bottom: 2.5rem; font-size: 2.25rem;">Shopping Cart</h1>
        
        <div style="display: grid; grid-template-columns: 1fr 380px; gap: 3rem;">
            <!-- Cart Items -->
            <section id="cart-list" style="display: flex; flex-direction: column; gap: 1.5rem;">
                <!-- Placeholder Item -->
                <div class="card" style="display: grid; grid-template-columns: 120px 1fr 150px; gap: 2rem; align-items: center;">
                    <div style="background-color: var(--gray-100); height: 120px; border-radius: 4px; overflow: hidden;">
                        <img src="https://via.placeholder.com/120x120?text=Watch" style="width: 100%; height: 100%; object-fit: cover;">
                    </div>
                    <div>
                        <h3 style="font-size: 1.25rem;">Elegant Chronograph</h3>
                        <p style="color: var(--gray-500); margin: 0.25rem 0;">Silver / One Size</p>
                        <p style="color: var(--success); font-weight: 600; font-size: 0.875rem;">In Stock</p>
                        <button style="background: none; border: none; color: var(--error); font-size: 0.8rem; cursor: pointer; margin-top: 1rem; font-weight: 600;">Remove</button>
                    </div>
                    <div style="text-align: right;">
                        <p style="font-weight: 700; font-size: 1.25rem;">$199.99</p>
                        <div style="display: flex; align-items: center; justify-content: flex-end; gap: 0.5rem; margin-top: 1rem;">
                            <label style="font-size: 0.8rem;">Qty:</label>
                            <select class="form-control" style="width: 60px; padding: 0.25rem;">
                                <option>1</option>
                                <option>2</option>
                                <option>3</option>
                            </select>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Order Summary -->
            <aside>
                <div class="card" style="background-color: var(--white); position: sticky; top: 100px;">
                    <h2 style="font-size: 1.5rem; margin-bottom: 1.5rem;">Order Summary</h2>
                    
                    <div style="display: flex; flex-direction: column; gap: 1rem; border-bottom: 1px solid var(--gray-200); padding-bottom: 1.5rem; margin-bottom: 1.5rem;">
                        <div style="display: flex; justify-content: space-between;">
                            <span style="color: var(--gray-600);">Subtotal</span>
                            <span style="font-weight: 500;">$199.99</span>
                        </div>
                        <div style="display: flex; justify-content: space-between;">
                            <span style="color: var(--gray-600);">Shipping</span>
                            <span style="color: var(--success); font-weight: 500;">FREE</span>
                        </div>
                        <div style="display: flex; justify-content: space-between;">
                            <span style="color: var(--gray-600);">Tax</span>
                            <span style="font-weight: 500;">$16.00</span>
                        </div>
                    </div>

                    <div style="display: flex; justify-content: space-between; font-size: 1.25rem; font-weight: 700; margin-bottom: 2rem;">
                        <span>Total</span>
                        <span>$215.99</span>
                    </div>

                    <button class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem; border-radius: 8px;">Proceed to Checkout</button>
                    
                    <p style="text-align: center; font-size: 0.8rem; color: var(--gray-400); margin-top: 1.5rem;">
                        <i class="fas fa-lock"></i> Secure checkout powered by Stripe
                    </p>
                </div>
            </aside>
        </div>
    </main>

    <script type="module">
        import api from './js/api.js';
        if (localStorage.getItem('token')) {
            document.getElementById('user-menu').style.display = 'block';
        }
    </script>
</body>
</html>
