<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Category — PremiumStore</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="site-header">
  <div class="container nav-inner">
    <a href="index.html" class="logo"><i class="fas fa-bolt"></i> PremiumStore</a>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="category.html" class="active">Categories</a>
      <a href="auth.html"><i class="fas fa-user"></i></a>
      <a href="cart.html" class="nav-cart">
        <i class="fas fa-shopping-bag"></i>
        <span class="cart-badge">0</span>
      </a>
    </nav>
  </div>
</header>

<!-- Category Hero -->
<div class="cat-hero">
  <div class="container">
    <h1 id="cat-title">All Products</h1>
    <p id="cat-sub">Showing all items</p>
  </div>
</div>

<main class="container">
  <!-- Category Nav Chips -->
  <div class="filter-bar">
    <a href="category.html"              class="btn btn-sm btn-outline" id="chip-all">All</a>
    <a href="category.html?cat=Electronics"   class="btn btn-sm btn-outline" id="chip-electronics">Electronics</a>
    <a href="category.html?cat=Fashion"       class="btn btn-sm btn-outline" id="chip-fashion">Fashion</a>
    <a href="category.html?cat=Furniture"     class="btn btn-sm btn-outline" id="chip-furniture">Furniture</a>
    <a href="category.html?cat=Home+%26+Living" class="btn btn-sm btn-outline" id="chip-home">Home & Living</a>
    <a href="category.html?cat=Watches"       class="btn btn-sm btn-outline" id="chip-watches">Watches</a>
    <span class="filter-count" id="filter-count"></span>
  </div>

  <div id="products-grid" class="product-grid"></div>
</main>

<footer class="footer">
  <div class="container">
    <div class="footer-bottom">© 2025 PremiumStore. All rights reserved.</div>
  </div>
</footer>

<script type="module">
import productsData from './js/products-data.js';
import { cart } from './js/cart-system.js';

const params = new URLSearchParams(location.search);
const catFilter = params.get('cat') || '';

// Page metadata
const title    = catFilter || 'All Products';
const subtitle = catFilter
  ? `Browsing the ${catFilter} collection`
  : 'All categories — discover something new';

document.getElementById('page-title').textContent = title + ' — PremiumStore';
document.getElementById('cat-title').textContent  = title;
document.getElementById('cat-sub').textContent    = subtitle;

// Highlight active chip
const chipMap = {
  '': 'all', 'Electronics': 'electronics', 'Fashion': 'fashion',
  'Furniture': 'furniture', 'Home & Living': 'home', 'Watches': 'watches'
};
const activeChip = document.getElementById('chip-' + (chipMap[catFilter] || 'all'));
if (activeChip) { activeChip.classList.remove('btn-outline'); activeChip.classList.add('btn-primary'); }

// Filter products
const items = catFilter
  ? productsData.filter(p => p.category === catFilter)
  : productsData;

document.getElementById('filter-count').textContent = `${items.length} item${items.length !== 1 ? 's' : ''}`;

function cardHtml(p) {
  return `
  <div class="product-card fade-up">
    <a href="details.html?id=${p.id}" class="product-card__img">
      <img src="${p.image}" alt="${p.name}" loading="lazy"
        onerror="this.src='https://placehold.co/400x400/e0f7fa/0eb5c8?text=${encodeURIComponent(p.name.slice(0,16))}'">
    </a>
    <div class="product-card__body">
      <div class="product-card__cat">${p.category}</div>
      <div class="product-card__name">${p.name}</div>
      <div class="product-card__footer">
        <div class="product-card__price">$${p.price.toFixed(2)}</div>
        <button class="add-btn" data-id="${p.id}"><i class="fas fa-plus"></i></button>
      </div>
    </div>
  </div>`;
}

const grid = document.getElementById('products-grid');

if (items.length === 0) {
  grid.innerHTML = `
    <div class="empty-state" style="grid-column:1/-1">
      <i class="fas fa-box-open"></i>
      <h2>No products found</h2>
      <p>Try a different category or browse all items.</p>
      <a href="category.html" class="btn btn-primary">Browse All</a>
    </div>`;
} else {
  grid.innerHTML = items.map(cardHtml).join('');
  grid.querySelectorAll('.add-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const p = productsData.find(x => x.id === +btn.dataset.id);
      if (p) {
        cart.add(p);
        btn.classList.add('added');
        btn.innerHTML = '<i class="fas fa-check"></i>';
        setTimeout(() => { btn.classList.remove('added'); btn.innerHTML = '<i class="fas fa-plus"></i>'; }, 1200);
      }
    });
  });
}

cart._badge();
</script>
</body>
</html>
