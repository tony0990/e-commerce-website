<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | PremiumStore</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-shopping-bag"></i> PremiumStore
            </a>
            
            <nav class="nav-actions">
                <a href="products.html" class="nav-link">Shop</a>
                <a href="cart.html" class="nav-link"><i class="fas fa-shopping-cart"></i> Cart</a>
                <button id="logout-btn" class="btn btn-secondary" style="padding: 0.4rem 0.8rem;">Logout</button>
            </nav>
        </div>
    </header>

    <main class="container" style="padding: 4rem 1.5rem; display: grid; grid-template-columns: 280px 1fr; gap: 4rem;">
        <!-- Sidebar -->
        <aside>
            <div class="card" style="text-align: center; padding: 2rem 1.5rem;">
                <div style="width: 100px; height: 100px; background-color: var(--gray-200); border-radius: 50%; margin: 0 auto 1.5rem; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: var(--gray-500);">
                    <i class="fas fa-user"></i>
                </div>
                <h3 id="profile-name">User Name</h3>
                <p id="profile-email" style="color: var(--gray-500); font-size: 0.875rem; margin-top: 0.25rem;">user@example.com</p>
                <div id="admin-badge" style="display: none; margin-top: 1rem;">
                    <span class="badge" style="background-color: var(--primary); color: white;">Administrator</span>
                </div>
            </div>

            <nav style="margin-top: 2rem; display: flex; flex-direction: column; gap: 0.5rem;">
                <a href="profile.html" class="btn btn-secondary" style="justify-content: flex-start; background: var(--white); color: var(--gray-800); border: 1px solid var(--gray-200);">
                    <i class="fas fa-user-edit"></i> Profile Info
                </a>
                <a href="orders.html" class="btn btn-secondary" style="justify-content: flex-start; background: transparent; color: var(--gray-600); border: none;">
                    <i class="fas fa-box"></i> My Orders
                </a>
                <a href="wishlist.html" class="btn btn-secondary" style="justify-content: flex-start; background: transparent; color: var(--gray-600); border: none;">
                    <i class="fas fa-heart"></i> Wishlist
                </a>
                <a id="admin-link" href="admin.html" class="btn btn-secondary" style="display: none; justify-content: flex-start; background: transparent; color: var(--accent); border: none;">
                    <i class="fas fa-user-shield"></i> Admin Dashboard
                </a>
            </nav>
        </aside>

        <!-- Profile Content -->
        <section>
            <div class="card animate-fade-in">
                <h2 style="margin-bottom: 2rem; font-size: 1.5rem;">Personal Information</h2>
                <form id="profile-form">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                        <div class="form-group">
                            <label class="form-label">First Name</label>
                            <input type="text" id="first-name" class="form-control" value="">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Last Name</label>
                            <input type="text" id="last-name" class="form-control" value="">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" id="email" class="form-control" value="" disabled>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Phone Number</label>
                        <input type="tel" id="phone" class="form-control" value="">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Address</label>
                        <input type="text" id="address" class="form-control" value="">
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.5rem;">
                        <div class="form-group">
                            <label class="form-label">City</label>
                            <input type="text" id="city" class="form-control" value="">
                        </div>
                        <div class="form-group">
                            <label class="form-label">State</label>
                            <input type="text" id="state" class="form-control" value="">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Zip Code</label>
                            <input type="text" id="zip_code" class="form-control" value="">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary" style="margin-top: 1rem; padding: 0.75rem 2rem;">Save Changes</button>
                </form>
            </div>
        </section>
    </main>

    <script type="module">
        import api from './js/api.js';

        async function init() {
            try {
                const result = await api.getMe();
                const user = result.data;
                
                document.getElementById('profile-name').textContent = `${user.first_name} ${user.last_name}`;
                document.getElementById('profile-email').textContent = user.email;
                document.getElementById('first-name').value = user.first_name;
                document.getElementById('last-name').value = user.last_name;
                document.getElementById('email').value = user.email;
                document.getElementById('phone').value = user.phone || '';
                document.getElementById('address').value = user.address || '';
                document.getElementById('city').value = user.city || '';
                document.getElementById('state').value = user.state || '';
                document.getElementById('zip_code').value = user.zip_code || '';

                if (user.role === 'admin') {
                    document.getElementById('admin-badge').style.display = 'block';
                    document.getElementById('admin-link').style.display = 'flex';
                }
            } catch (err) {
                api.logout();
            }
        }

        document.getElementById('logout-btn').addEventListener('click', () => api.logout());

        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                const data = {
                    first_name: document.getElementById('first-name').value,
                    last_name: document.getElementById('last-name').value,
                    phone: document.getElementById('phone').value,
                    address: document.getElementById('address').value,
                    city: document.getElementById('city').value,
                    state: document.getElementById('state').value,
                    zip_code: document.getElementById('zip_code').value
                };
                await api.updateProfile(data);
                alert('Profile updated successfully!');
                init();
            } catch (err) {
                alert(err.message);
            }
        });

        init();
    </script>
</body>
</html>
